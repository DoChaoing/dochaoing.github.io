<!-- 初始化程式碼高亮 -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 語言別名映射 - 將常見別名映射到 Prism 支援的語言
    const langAliases = {
      'shell': 'bash',
      'sh': 'bash',
      'zsh': 'bash',
      'ts': 'typescript',
      'jsx': 'javascript',
      'tsx': 'typescript',
      'yml': 'yaml',
      'md': 'markdown',
      'dockerfile': 'docker',
      'pwsh': 'powershell'
    };

    // 處理 Hexo 生成的 <pre><code class="highlight lang"> 結構
    // 需要清理已有的 span 標籤，讓 Prism.js 重新高亮
    document.querySelectorAll('pre code.highlight').forEach(function(codeEl) {
      let lang = 'plaintext';
      
      // 從 class 中提取語言 (格式: highlight lang 或 language-lang)
      const classList = Array.from(codeEl.classList);
      for (const cls of classList) {
        if (cls === 'highlight') continue;
        if (cls.startsWith('language-')) {
          lang = cls.replace('language-', '');
          break;
        }
        // highlight 後面跟的語言名
        lang = cls;
        break;
      }
      
      // 應用語言別名
      if (langAliases[lang]) {
        lang = langAliases[lang];
      }
      
      // 如果還是 plaintext，嘗試內容檢測
      if (lang === 'plaintext') {
        lang = detectLangFromContent(codeEl.textContent);
      }
      
      // 清理已有的 span 標標籤，獲取純文字內容
      const plainCode = codeEl.textContent;
      
      // 設置正確的 class 和純文字內容
      codeEl.className = 'language-' + lang;
      codeEl.textContent = plainCode;
      codeEl.parentElement.classList.add('line-numbers', 'language-' + lang);
    });
    
    // 處理標準的 pre > code（沒有 highlight class 的情況）
    document.querySelectorAll('pre code:not(.highlight)').forEach(function(block) {
      // 跳過已經處理過的
      if (block.classList.contains('language-processed')) return;
      
      let lang = 'plaintext';
      
      // 從 class 中提取語言
      const classList = Array.from(block.classList);
      for (const cls of classList) {
        if (cls.startsWith('language-')) {
          lang = cls.replace('language-', '');
          break;
        }
      }
      
      // 應用語言別名
      if (langAliases[lang]) {
        lang = langAliases[lang];
      }
      
      // 如果還是 plaintext，嘗試內容檢測
      if (lang === 'plaintext') {
        lang = detectLangFromContent(block.textContent);
      }
      
      block.className = 'language-' + lang;
      block.parentElement.classList.add('language-' + lang, 'line-numbers');
      block.classList.add('language-processed');
    });
    
    // 執行 Prism 高亮
    if (typeof Prism !== 'undefined') {
      Prism.highlightAll();
    }
  });
  
  // 根據程式碼內容推斷語言
  function detectLangFromContent(content) {
    if (!content) return 'plaintext';
    
    // Shell/Bash 特徵
    if (/^[$#>]\s/.test(content.trim()) ||
        /\b(sudo|apt|brew|npm|yarn|pnpm|pip|cargo|git|docker|kubectl|helm)\s/.test(content) ||
        /\b(export|chmod|chown|mkdir|rm|cp|mv|cat|echo|grep|sed|awk|find|curl|wget)\s/.test(content) ||
        content.includes('#!/bin/bash') || content.includes('#!/bin/sh') ||
        content.includes('#!/usr/bin/env')) {
      return 'bash';
    }
    
    if (content.includes('#include') || content.includes('int main') ||
        content.includes('cout') || content.includes('cin') ||
        content.includes('iostream') || content.includes('using namespace')) {
      return 'cpp';
    }
    if (content.includes('def ') || content.includes('import ') || content.includes('print(') ||
        content.includes('from ') && content.includes('import')) {
      return 'python';
    }
    if (content.includes('function') || content.includes('const ') ||
        content.includes('let ') || content.includes('=>') ||
        content.includes('require(')) {
      return 'javascript';
    }
    if (content.includes('public class') || content.includes('public static void') ||
        content.includes('System.out.println')) {
      return 'java';
    }
    if (content.includes('Widget') || content.includes('Flutter') || content.includes('@override')) {
      return 'dart';
    }
    if (content.includes('func ') && content.includes(': ') || content.includes('package main')) {
      return 'go';
    }
    if (content.includes('fn ') && content.includes('->') || content.includes('let mut')) {
      return 'rust';
    }
    
    return 'plaintext';
  }
</script>
